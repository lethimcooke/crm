<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominion — Outreach CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:   #070D1A;
  --deep:  #0F1829;
  --mid:   #1A2B48;
  --steel: #3A5070;
  --mist:  #7A8FAD;
  --chalk: #E8EEF8;
  --blue:  #3D8EFF;
  --border: rgba(61,142,255,0.09);
  --green: #00C97A;
  --yellow: #FFB800;
  --red: #E0192B;
  --purple: #8B5CF6;
}
body { background: var(--ink); color: var(--chalk); font-family: 'Barlow', sans-serif; font-weight: 300; min-height: 100vh; }

/* HEADER */
.header {
  background: #000;
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 68px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-logo { display: flex; align-items: center; gap: 12px; }
.header-mark { width: 32px; height: 32px; background: var(--blue); display: flex; align-items: center; justify-content: center; }
.header-wordmark { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 6px; color: var(--chalk); }
.header-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--mist); }

/* STATS BAR */
.stats-bar {
  display: flex; gap: 2px;
  padding: 0 32px; margin: 32px 0 0;
  max-width: 1200px; margin: 32px auto 0;
  padding: 0 32px;
}
.stat-card {
  background: var(--deep); flex: 1; padding: 20px 24px;
  border-top: 3px solid transparent;
}
.stat-card.total { border-top-color: var(--blue); }
.stat-card.contacted { border-top-color: var(--mist); }
.stat-card.replied { border-top-color: var(--yellow); }
.stat-card.converted { border-top-color: var(--green); }
.stat-card.closed { border-top-color: var(--red); }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 2px; line-height: 1; }
.stat-card.total .stat-num { color: var(--blue); }
.stat-card.contacted .stat-num { color: var(--mist); }
.stat-card.replied .stat-num { color: var(--yellow); }
.stat-card.converted .stat-num { color: var(--green); }
.stat-card.closed .stat-num { color: var(--red); }
.stat-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--steel); margin-top: 4px; }

/* TOOLBAR */
.toolbar {
  max-width: 1200px; margin: 24px auto 0;
  padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.filter-tabs { display: flex; gap: 2px; }
.filter-tab {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  padding: 8px 16px; cursor: pointer;
  background: var(--deep); color: var(--mist);
  border: none; transition: all 0.15s;
}
.filter-tab.active { background: var(--blue); color: var(--ink); }
.filter-tab:hover:not(.active) { color: var(--chalk); }

.add-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  font-weight: 700; background: var(--blue); color: var(--ink);
  border: none; padding: 10px 24px; cursor: pointer; transition: opacity 0.2s;
}
.add-btn:hover { opacity: 0.85; }

/* TABLE */
.table-wrap {
  max-width: 1200px; margin: 16px auto 40px;
  padding: 0 32px;
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border); }
th {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--steel); padding: 12px 16px; text-align: left;
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s; cursor: pointer;
}
tbody tr:hover { background: var(--deep); }
td { padding: 16px; font-size: 13.5px; color: var(--chalk); vertical-align: middle; }
td.muted { color: var(--mist); font-size: 13px; }

/* STATUS BADGES */
.badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  padding: 4px 10px; font-weight: 700; white-space: nowrap;
}
.badge.contacted  { background: rgba(122,143,173,0.15); color: var(--mist); }
.badge.replied    { background: rgba(255,184,0,0.15);   color: var(--yellow); }
.badge.interested { background: rgba(139,92,246,0.15);  color: var(--purple); }
.badge.converted  { background: rgba(0,201,122,0.15);   color: var(--green); }
.badge.closed     { background: rgba(224,25,43,0.15);   color: var(--red); }
.badge.follow-up  { background: rgba(61,142,255,0.15);  color: var(--blue); }

.niche-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  padding: 3px 8px; background: var(--mid); color: var(--mist);
}

.action-btn {
  background: none; border: 1px solid var(--border);
  color: var(--mist); font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  padding: 5px 12px; cursor: pointer; transition: all 0.15s; margin-right: 4px;
}
.action-btn:hover { border-color: var(--blue); color: var(--blue); }
.action-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(7,13,26,0.92);
  z-index: 200;
  display: none; align-items: flex-start; justify-content: center;
  padding: 40px 20px; overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--deep);
  width: 100%; max-width: 640px;
  border: 1px solid var(--border);
  border-top: 3px solid var(--blue);
  flex-shrink: 0;
}
.modal-header {
  padding: 28px 32px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 2px; color: var(--chalk);
}
.modal-close {
  background: none; border: none; color: var(--mist);
  font-size: 20px; cursor: pointer; padding: 4px 8px;
  transition: color 0.15s;
}
.modal-close:hover { color: var(--chalk); }
.modal-body { padding: 28px 32px 32px; }

.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--steel); margin-bottom: 8px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--mid);
  border: 1px solid var(--steel); color: var(--chalk);
  font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 300;
  padding: 10px 14px; outline: none; transition: border-color 0.2s;
  appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--blue); }
.form-select option { background: var(--deep); }
.form-textarea { height: 120px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-actions { display: flex; gap: 12px; margin-top: 24px; }
.form-submit {
  flex: 1; background: var(--blue); color: var(--ink);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  font-weight: 700; padding: 14px; border: none; cursor: pointer; transition: opacity 0.2s;
}
.form-submit:hover { opacity: 0.85; }
.form-cancel {
  background: none; border: 1px solid var(--steel); color: var(--mist);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  padding: 14px 24px; cursor: pointer; transition: all 0.15s;
}
.form-cancel:hover { border-color: var(--chalk); color: var(--chalk); }

/* NOTES PANEL */
.notes-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.notes-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--steel); margin-bottom: 12px;
}
.note-entry {
  background: var(--ink); padding: 12px 16px; margin-bottom: 8px;
  border-left: 2px solid var(--blue);
}
.note-date { font-size: 11px; color: var(--steel); margin-bottom: 4px; font-family: monospace; }
.note-text { font-size: 13px; color: var(--mist); line-height: 1.7; }
.note-input-row { display: flex; gap: 8px; margin-top: 12px; }
.note-input {
  flex: 1; background: var(--mid); border: 1px solid var(--steel);
  color: var(--chalk); font-family: 'Barlow', sans-serif; font-size: 13px;
  padding: 10px 14px; outline: none; transition: border-color 0.2s;
}
.note-input:focus { border-color: var(--blue); }
.note-add-btn {
  background: var(--blue); color: var(--ink); border: none;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
  padding: 10px 18px; cursor: pointer; white-space: nowrap;
}

.empty-state {
  text-align: center; padding: 80px 32px;
  color: var(--steel);
}
.empty-state h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px; letter-spacing: 2px; color: var(--mid); margin-bottom: 12px;
}
.empty-state p { font-size: 14px; line-height: 1.8; }

@media(max-width:700px) {
  .stats-bar { flex-wrap: wrap; }
  .stat-card { min-width: calc(50% - 1px); }
  .form-row { grid-template-columns: 1fr; }
  .header { padding: 0 20px; }
  .toolbar, .table-wrap, .stats-bar { padding: 0 20px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="header-mark">
      <svg width="16" height="16" viewBox="0 0 26 26" fill="none">
        <rect x="3" y="3" width="4" height="20" fill="#070D1A"/>
        <path d="M7 3H17C22.523 3 27 7.477 27 13C27 18.523 22.523 23 17 23H7V3Z" fill="#070D1A"/>
      </svg>
    </div>
    <div>
      <div class="header-wordmark">DOMINION</div>
      <div class="header-sub">Outreach CRM</div>
    </div>
  </div>
  <button class="add-btn" onclick="openModal()">+ Add Prospect</button>
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar">
  <div class="stat-card total"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total</div></div>
  <div class="stat-card contacted"><div class="stat-num" id="s-contacted">0</div><div class="stat-label">Contacted</div></div>
  <div class="stat-card replied"><div class="stat-num" id="s-replied">0</div><div class="stat-label">Replied</div></div>
  <div class="stat-card converted"><div class="stat-num" id="s-converted">0</div><div class="stat-label">Converted</div></div>
  <div class="stat-card closed"><div class="stat-num" id="s-closed">0</div><div class="stat-label">Closed</div></div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
    <button class="filter-tab" onclick="setFilter('contacted',this)">Contacted</button>
    <button class="filter-tab" onclick="setFilter('replied',this)">Replied</button>
    <button class="filter-tab" onclick="setFilter('interested',this)">Interested</button>
    <button class="filter-tab" onclick="setFilter('converted',this)">Converted</button>
    <button class="filter-tab" onclick="setFilter('closed',this)">Closed</button>
  </div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Business</th>
        <th>Niche</th>
        <th>Platform</th>
        <th>Status</th>
        <th>Follow-up</th>
        <th>Last Contact</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div id="emptyState" class="empty-state" style="display:none;">
    <h3>NO PROSPECTS YET</h3>
    <p>Hit the "Add Prospect" button to log your first outreach.<br>Your pipeline starts here.</p>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">ADD PROSPECT</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-input" id="f-name" placeholder="e.g. Marco Sanchez">
        </div>
        <div class="form-group">
          <label class="form-label">Business Name</label>
          <input class="form-input" id="f-business" placeholder="e.g. Project Human">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Niche</label>
          <select class="form-select" id="f-niche">
            <option value="Trainer">Trainer / Coach</option>
            <option value="Realtor">Realtor / Agent</option>
            <option value="Gym Owner">Gym Owner</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Platform</label>
          <select class="form-select" id="f-platform">
            <option value="Facebook">Facebook</option>
            <option value="Instagram">Instagram</option>
            <option value="LinkedIn">LinkedIn</option>
            <option value="TikTok">TikTok</option>
            <option value="Email">Email</option>
            <option value="In Person">In Person</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="f-status">
            <option value="contacted">Contacted</option>
            <option value="replied">Replied</option>
            <option value="interested">Interested</option>
            <option value="follow-up">Follow-up Needed</option>
            <option value="converted">Converted ✓</option>
            <option value="closed">Closed ✗</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Follow-up Date</label>
          <input class="form-input" id="f-followup" type="date">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Website / Profile URL</label>
        <input class="form-input" id="f-url" placeholder="e.g. projecthuman.us">
      </div>
      <div class="form-group">
        <label class="form-label">Message Sent</label>
        <textarea class="form-textarea" id="f-message" placeholder="Paste the outreach message you sent..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="f-notes" placeholder="Any initial notes, context, or observations..."></textarea>
      </div>

      <!-- Notes thread (shown when editing) -->
      <div class="notes-section" id="notesThread" style="display:none;">
        <div class="notes-label">Conversation Log</div>
        <div id="notesList"></div>
        <div class="note-input-row">
          <input class="note-input" id="noteInput" placeholder="Add a note or update...">
          <button class="note-add-btn" onclick="addNote()">Add Note</button>
        </div>
      </div>

      <div class="form-actions">
        <button class="form-cancel" onclick="closeModal()">Cancel</button>
        <button class="form-submit" onclick="saveProspect()">Save Prospect</button>
      </div>
    </div>
  </div>
</div>

<script>
let prospects = [];
let currentFilter = 'all';
let editingId = null;

const STORAGE_KEY = 'dominion_crm_v1';

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) prospects = JSON.parse(saved);
  } catch(e) { prospects = []; }
  if (prospects.length === 0) {
    const today = new Date().toLocaleDateString();
    const fu = new Date(Date.now() + 3*24*60*60*1000).toISOString().split('T')[0];
    prospects = [
      { id:1, name:'Marco Sanchez', business:'Project Human', niche:'Trainer', platform:'Facebook', status:'contacted', followup:fu, url:'projecthuman.us', message:'Hey Marco, saw your announcement about Project Human in the Swampscott Nest group. Congrats on the launch, sounds like something the area genuinely needs.\n\nI\'m a brand designer based in Lynn and I work specifically with fitness and performance professionals. I actually went ahead and redesigned your website as a concept just to show you what it could look like with a more premium feel behind it.\n\nI can send you a preview this week. No obligation at all, just thought it might be useful timing wise as you\'re building momentum with the new space.\n\nWant me to send it over?', notes:'Local Swampscott business. Just launched. NHL/NFL background. Has two sites: projecthuman.us and coachmarcosanchez.com. High potential client.', log:[{date:today, text:'First outreach sent via Facebook DM. Offered free website concept preview.'}], created:today },
      { id:2, name:'Hayden (HaydenFit)', business:'HaydenFit', niche:'Trainer', platform:'Facebook', status:'contacted', followup:fu, url:'ironhavenshop.com/?ref=HAYDEN2', message:'Hey Hayden, came across your page and wanted to reach out. You\'ve got a solid service lineup going, 1:1 training, personalized programs, check-ins, NASM certified, an affiliate partnership. That\'s a real business. It just doesn\'t look like one yet.\n\nI\'m a brand designer who works specifically with personal trainers and fitness coaches. I actually put together a quick website concept for you that pulls everything together in one place. Your services and pricing, client testimonials, your IronHaven affiliate code, program details, and a booking section so people can actually take action when they land on it.\n\nRight now anyone who finds you has to piece it all together from your bio. A proper site changes that.\n\nI can send you a preview this week, no cost, no obligation. If you like it and want to use it we can talk. If not, no worries at all.\n\nWant me to send it over?', notes:'NASM certified. Based at FitStop Rochester. 72 followers. 1:1 training, programs, check-ins. IronHaven affiliate code HAYDEN786. Needs own brand separate from FitStop.', log:[{date:today, text:'First outreach sent via Facebook DM. Offered free website concept preview.'}], created:today },
      { id:3, name:'Sammi G', business:'Train With Sammi G', niche:'Trainer', platform:'Facebook', status:'contacted', followup:fu, url:'', message:'Hey Sammi, saw your post about taking on 1:1 clients and wanted to reach out. The way you\'ve positioned yourself around confidence and long term results rather than quick fixes is actually really smart and it\'s exactly the kind of thing that attracts the right clients.\n\nI\'m a brand designer who works specifically with personal trainers who are just starting to build their client base. The timing actually couldn\'t be better because the first impression you make online right now sets the tone for everything that follows.\n\nI put together a quick website concept for you that ties it all together. Your services, your story, a booking section so people can actually sign up without having to DM you, and a spot to showcase testimonials as you start collecting them from those first 5 clients.\n\nI can send you a preview this week, completely free, no strings attached. If you like it and want to use it we can go from there. If not, no worries at all.\n\nWant me to send it over?', notes:'Brand new PT, just launched publicly. 1:1 training focused on strength, habits, confidence. Offering discounted rate for first 5 clients. No website or brand yet. Perfect timing.', log:[{date:today, text:'First outreach sent via Facebook DM. Offered free website concept preview.'}], created:today },
      { id:4, name:'Preston Stewart', business:'Power Alley Fitness & Tanning', niche:'Gym Owner', platform:'Facebook', status:'contacted', followup:fu, url:'', message:'Hey Preston, saw your post about taking on new clients and wanted to reach out. You\'ve got something most trainers don\'t, your own facility, a NASM cert, and a real service lineup. Strength training, fat loss, nutrition, accountability. That\'s a complete package.\n\nI\'m a brand designer who works specifically with fitness professionals and gym owners. I noticed Power Alley doesn\'t have much of a personal brand presence tied to you as the trainer and owner behind it. Right now people have to message you directly just to find out pricing and availability which means you\'re losing people who won\'t take that step.\n\nI put together a quick website concept for you that ties it all together. Your services, your story as the owner and coach, a booking section, and a spot for client results as you collect them. Something that works for you even when you\'re on the floor training.\n\nI can send you a preview this week, no cost, no obligation. Want me to send it over?', notes:'NASM CPT. Owner and CEO of Power Alley Fitness and Tanning in Ellaville GA. 1.4K friends, good reach. Just posted taking new clients. Services: strength, fat loss, nutrition, accountability. No personal brand site. High value prospect.', log:[{date:today, text:'First outreach sent via Facebook DM. Offered free website concept preview.'}], created:today },
      { id:5, name:'Leia Patterson', business:'The Forge Method', niche:'Trainer', platform:'Facebook', status:'contacted', followup:fu, url:'theforgemethodcoaching.com', message:'Hey Leia, came across your page and wanted to reach out. The Forge Method is a genuinely strong brand name and your story around bodybuilding, discipline and faith is exactly the kind of positioning that builds a loyal client base rather than just one-off customers.\n\nI\'m a brand designer who works specifically with fitness coaches and personal trainers. I took a look at your current site and I think there\'s a real opportunity to bring it up to the level your brand name and your story actually deserve. Right now the site isn\'t quite doing justice to how strong your positioning is.\n\nI put together a redesign concept that leans into the Forge Method identity a lot harder. Stronger visuals, cleaner layout, a proper booking flow so people don\'t have to DM you just to get started.\n\nI can send you a preview this week, no cost, no strings attached. Want me to send it over?', notes:'Kansas City MO. Has existing website and brand. Instagram @leiapattersonfit. Bodybuilding, discipline, faith-based positioning. Strong brand name. Currently getting clients via DM only. Angle is upgrade not build from scratch. Higher potential budget.', log:[{date:today, text:'First outreach sent via Facebook DM. Offered free website redesign concept preview.'}], created:today },
      { id:6, name:'Chloe Brown', business:'Chloe Brown Real Estate', niche:'Realtor', platform:'Facebook', status:'contacted', followup:fu, url:'chloe@chloebrownealestate.com', message:'Hey Chloe, came across your page and had to reach out. 31 homes and over $18M sold in 2025 is genuinely impressive and the North Shore market is no joke.\n\nI\'m a brand designer based in Lynn and I work specifically with realtors. I noticed you\'re sending people to a Linktree right now which means anyone who wants to learn more about you, see your listings, check your reviews, or reach out is bouncing between different places to piece it all together.\n\nI put together a website concept for you that works as a one stop shop. Your story, your market areas, testimonials from past clients, a contact form, and all your listings in one place. Something you can hand to every new lead and say this is me, this is what I do, this is how to work with me.\n\nFor someone doing your volume it should be the first thing people find when they Google your name.\n\nI can send you a preview this week, completely free, no obligation. Want me to send it over?', notes:'West Peabody MA, North Shore and Southern NH market. Lyv Realty. 31 homes, $18M sold in 2025. 1.1K followers. Has Linktree but no real website. Local to Lynn. High value prospect.', log:[{date:today, text:'First outreach sent via Facebook DM. One stop shop website angle.'}], created:today },
      { id:7, name:'Stuart Ball', business:'Stuart Ball Coaching', niche:'Trainer', platform:'Facebook', status:'replied', followup:fu, url:'instagram.com/coach_stuball', message:'Hey Stuart, saw your intro post and had to reach out. Ex British Army, Invictus Games, mental health journey, menopause coaching, indoor rowing coach. That is genuinely one of the most compelling personal stories I have come across in the fitness space and right now it is buried in a Facebook post.\n\nI am a brand designer who works specifically with personal trainers and coaches. Someone with your background and your why deserves a brand that leads with that story the moment anyone finds you online. Not just an Instagram link.\n\nI put together a website concept for you that brings it all together. Your story, your services, your coaching approach, and a proper way for people to reach you and book in without having to hunt you down across platforms.\n\nI can send you a preview this week, no cost, no obligation. Want me to send it over?', notes:'Ex British Army 21 years. Represented Team UK at Invictus Games. Mental health focus. Menopause coaching. British Rowing indoor coach. Online and 1:2:1. UK based. Lives in Lisburn. Director at MagentaOutdoor. REPLIED and asked about price and ROI. Sent concept site on tiiny.host. Price quoted $497. Hot prospect.', log:[{date:today, text:'First outreach sent via Facebook DM.'},{date:today, text:'Replied: Please do. Sent concept site preview link.'},{date:today, text:'Asked about price and how many clients. Quoted $497 full package. Explained ROI honestly.'}], created:today }
    ];
    save();
  }
  render();
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(prospects)); } catch(e) {}
}

function render() {
  const filtered = currentFilter === 'all' ? prospects : prospects.filter(p => p.status === currentFilter);
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  // Stats
  document.getElementById('s-total').textContent = prospects.length;
  document.getElementById('s-contacted').textContent = prospects.filter(p => p.status === 'contacted').length;
  document.getElementById('s-replied').textContent = prospects.filter(p => p.status === 'replied').length;
  document.getElementById('s-converted').textContent = prospects.filter(p => p.status === 'converted').length;
  document.getElementById('s-closed').textContent = prospects.filter(p => p.status === 'closed').length;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(p => {
    const followupStr = p.followup ? new Date(p.followup + 'T12:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'}) : '—';
    const isOverdue = p.followup && new Date(p.followup) < new Date() && p.status !== 'converted' && p.status !== 'closed';
    return `<tr onclick="openEdit(${p.id})">
      <td><strong>${p.name}</strong></td>
      <td class="muted">${p.business || '—'}</td>
      <td><span class="niche-tag">${p.niche}</span></td>
      <td class="muted">${p.platform}</td>
      <td><span class="badge ${p.status}">${p.status.replace('-',' ')}</span></td>
      <td style="color:${isOverdue ? 'var(--red)' : 'var(--mist)'}; font-size:13px;">${followupStr}${isOverdue ? ' ⚠' : ''}</td>
      <td class="muted">${p.log && p.log.length ? p.log[p.log.length-1].date : p.created}</td>
      <td onclick="event.stopPropagation()">
        <button class="action-btn" onclick="openEdit(${p.id})">View</button>
        <button class="action-btn danger" onclick="deleteProspect(${p.id})">Delete</button>
      </td>
    </tr>`;
  }).join('');
}

function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'ADD PROSPECT';
  document.getElementById('editId').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-business').value = '';
  document.getElementById('f-niche').value = 'Trainer';
  document.getElementById('f-platform').value = 'Facebook';
  document.getElementById('f-status').value = 'contacted';
  document.getElementById('f-followup').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('f-message').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('notesThread').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEdit(id) {
  const p = prospects.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'EDIT PROSPECT';
  document.getElementById('editId').value = id;
  document.getElementById('f-name').value = p.name;
  document.getElementById('f-business').value = p.business || '';
  document.getElementById('f-niche').value = p.niche;
  document.getElementById('f-platform').value = p.platform;
  document.getElementById('f-status').value = p.status;
  document.getElementById('f-followup').value = p.followup || '';
  document.getElementById('f-url').value = p.url || '';
  document.getElementById('f-message').value = p.message || '';
  document.getElementById('f-notes').value = p.notes || '';

  // Show notes thread
  document.getElementById('notesThread').style.display = 'block';
  renderNotes(p);

  document.getElementById('modalOverlay').classList.add('open');
}

function renderNotes(p) {
  const log = p.log || [];
  document.getElementById('notesList').innerHTML = log.length === 0
    ? '<div style="font-size:13px;color:var(--steel);padding:8px 0;">No updates yet. Add your first note below.</div>'
    : log.map(n => `<div class="note-entry"><div class="note-date">${n.date}</div><div class="note-text">${n.text}</div></div>`).join('');
}

function addNote() {
  const input = document.getElementById('noteInput');
  const text = input.value.trim();
  if (!text || !editingId) return;
  const p = prospects.find(x => x.id === editingId);
  if (!p) return;
  if (!p.log) p.log = [];
  p.log.push({ date: new Date().toLocaleDateString(), text });
  input.value = '';
  renderNotes(p);
  save();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function saveProspect() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required.'); return; }

  if (editingId) {
    const idx = prospects.findIndex(x => x.id === editingId);
    if (idx > -1) {
      prospects[idx] = {
        ...prospects[idx],
        name,
        business: document.getElementById('f-business').value.trim(),
        niche: document.getElementById('f-niche').value,
        platform: document.getElementById('f-platform').value,
        status: document.getElementById('f-status').value,
        followup: document.getElementById('f-followup').value,
        url: document.getElementById('f-url').value.trim(),
        message: document.getElementById('f-message').value.trim(),
        notes: document.getElementById('f-notes').value.trim(),
      };
    }
  } else {
    prospects.unshift({
      id: Date.now(),
      name,
      business: document.getElementById('f-business').value.trim(),
      niche: document.getElementById('f-niche').value,
      platform: document.getElementById('f-platform').value,
      status: document.getElementById('f-status').value,
      followup: document.getElementById('f-followup').value,
      url: document.getElementById('f-url').value.trim(),
      message: document.getElementById('f-message').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
      log: [],
      created: new Date().toLocaleDateString()
    });
  }

  save();
  render();
  closeModal();
}

function deleteProspect(id) {
  if (!confirm('Delete this prospect?')) return;
  prospects = prospects.filter(x => x.id !== id);
  save();
  render();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Enter key on note input
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement.id === 'noteInput') addNote();
});

load();
</script>
</body>
</html>
